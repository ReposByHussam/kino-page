<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kino - Profil</title>

  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="./new-ui.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="newUi">
  <header class="newHeader">
    <div class="newHeader__content">
      <a class="newHeader__brand" href="./index-new.html" aria-label="Start">
        <img class="newHeader__logo" src="../pics/KINO-logo.png" alt="Kino">
      </a>

      <nav class="newHeader__nav" aria-label="Huvudmeny">
        <a class="newHeader__item" href="./index-new.html#filmer-idag">Filmer idag</a>
        <a class="newHeader__item" href="./index-new.html#kommande">Kommande</a>
        <a class="newHeader__item" href="../../bistro.html">På bio</a>
        <a class="newHeader__item" href="./index-new.html#mer">Mer...</a>
        <a class="newHeader__item" href="../../contact.html">Kontakta oss</a>
        <a class="newHeader__item newHeader__item--action" href="./login.html">Logga in</a>
        <a class="newHeader__item newHeader__item--action" href="./signup.html">Bli medlem</a>
      </nav>
    </div>
  </header>

  <main class="newMain">
    <section class="newSection">
      <div class="newContainer" id="profileRoot">
        <div class="row justify-content-center">
          <div class="col-12 col-md-9 col-lg-7">
            <div class="card shadow-sm">
              <div class="card-body p-4">
                <h1 class="h3 mb-3">Min profil</h1>

                <div class="mb-3">
                  <div class="fw-semibold">Fullständigt namn</div>
                  <div id="profileName" class="text-muted"></div>
                </div>

                <div class="mb-3">
                  <div class="fw-semibold">Användarnamn</div>
                  <div id="profileUsername" class="text-muted"></div>
                </div>

                <div class="mb-4">
                  <div class="fw-semibold">E-post</div>
                  <div id="profileEmail" class="text-muted"></div>
                </div>

                <button id="logoutBtn" class="btn btn-outline-dark">Logga ut</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script type="module" src="./auth.js"></script>
</body>
</html>
