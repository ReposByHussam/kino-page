<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Kino - Logga in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="../styles/main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <header class="header">
    <div class="header__content">
      <a href="../../index.html" aria-label="Start">
        <img class="header__img" src="../pics/KINO-logo.png" alt="Logo">
      </a>

      <button class="header__hamburger-menu" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>

      <nav class="header__nav">
        <ul class="header__menu-list">
          <li class="header__menu-item menu-desktop movies">
            <a class="btn-menu btn-menu--one" href="../../index.html">Filmer idag</a>
          </li>
          <li class="header__menu-item menu-desktop">
            <a class="btn-menu btn-menu--one" href="../../index.html">Kommande</a>
          </li>
          <li class="header__menu-item menu-desktop">
            <a class="btn-menu btn-menu--one" href="../../bistro.html">På bio</a>
          </li>
          <li class="header__menu-item menu-desktop-xlarge">
            <a class="btn-menu btn-menu--one" href="../../index.html">Mer...</a>
          </li>
          <li class="header__menu-item menu-desktop menu-contact">
            <a class="btn-menu btn-menu--one" href="../../contact.html">Kontakta Oss</a>
          </li>
          <li class="header__menu-item menu-medium login">
            <a class="btn-menu btn-menu--two" href="./login.html">Logga in</a>
          </li>
          <li class="header__menu-item menu-hide-medium">
            <a class="btn-menu btn-menu--two" href="./signup.html">Bli medlem</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container py-5" style="max-width: 900px;">
    <div class="row g-4 align-items-start">
      <div class="col-12 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h4 mb-3">Logga in</h1>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label class="form-label" for="loginUsername">Användarnamn</label>
                <input class="form-control" id="loginUsername" name="username" autocomplete="username" required>
                <div class="invalid-feedback">Skriv ditt användarnamn.</div>
              </div>

              <div class="mb-3">
                <label class="form-label" for="loginPassword">Lösenord</label>
                <input class="form-control" id="loginPassword" name="password" type="password" autocomplete="current-password" required>
                <div class="invalid-feedback">Skriv ditt lösenord.</div>
              </div>

              <div id="loginMsg" class="small mb-3" aria-live="polite"></div>

              <button class="btn btn-dark" type="submit">Logga in</button><!--center button-->

              <p class="mt-3 mb-0 small">
                Saknar konto? <a href="./signup.html">Skapa konto</a>
              </p>
            </form>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-7">
        <img src="../pics/KINO-logo.png" alt="Kino" style="max-width: 100%; height: auto; display:block;">
      </div>
    </div>
  </main>

  <script type="module" src="./auth.js"></script>
</body>
</html>
